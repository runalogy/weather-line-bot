name: 每日台北天氣推播

on:
  repository_dispatch:
    types: [trigger-weather]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: 執行天氣推播
        env:
          CWA_API_KEY:               ${{ secrets.CWA_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID:             ${{ secrets.LINE_GROUP_ID }}
          LINE_GROUP_ID_2:           ${{ secrets.LINE_GROUP_ID_2 }}
          LINE_GROUP_ID_3:           ${{ secrets.LINE_GROUP_ID_3 }}
          LINE_GROUP_ID_4:           ${{ secrets.LINE_GROUP_ID_4 }}
        run: python weather_line_notify.py
